<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>汉字轻松学 — เรียนภาษาจีนง่ายๆ</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Hanzi Writer -->
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 顶部导航栏 -->
  <nav class="bg-white shadow-sm sticky top-0 z-50 mb-4">
    <div class="max-w-4xl mx-auto px-4 h-14 flex items-center justify-end gap-3">
      <!-- 登录按钮 -->
      <button id="login-btn" onclick="Auth.showLoginPrompt()" class="text-sm text-blue-600 hover:underline">
        เข้าสู่ระบบ
      </button>
      <!-- 用户头像 -->
      <div id="user-avatar" style="display:none" class="relative">
        <button onclick="Auth.toggleMenu()" class="w-8 h-8 rounded-full overflow-hidden border-2 border-blue-500">
          <img src="" alt="" class="w-full h-full object-cover" referrerpolicy="no-referrer" />
        </button>
        <div id="user-menu" style="display:none" class="absolute right-0 top-10 bg-white shadow-lg rounded-xl p-3 w-48 border border-gray-100 z-50">
          <p id="user-display-name" class="text-sm font-medium truncate"></p>
          <p id="user-email" class="text-xs text-gray-500 truncate mb-2"></p>
          <button onclick="Auth.signOut()" class="text-sm text-red-500 hover:text-red-600">ออกจากระบบ</button>
        </div>
      </div>
    </div>
  </nav>

  <!-- 登录弹窗 -->
  <div id="login-modal" style="display:none" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-8 max-w-sm w-full mx-4 text-center">
      <div class="text-5xl mb-4">☁️</div>
      <h2 class="text-xl font-bold mb-2">บันทึกความก้าวหน้า</h2>
      <p class="text-gray-500 mb-6">เข้าสู่ระบบเพื่อซิงค์ข้อมูลการเรียนรู้ข้ามอุปกรณ์</p>
      <button
        onclick="Auth.hideLoginPrompt(); Auth.signInWithGoogle();"
        class="w-full py-3 px-4 bg-white border-2 border-gray-200 rounded-xl font-medium text-lg hover:bg-gray-50 transition flex items-center justify-center gap-3"
      >
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        เข้าสู่ระบบด้วย Google
      </button>
      <button onclick="Auth.hideLoginPrompt()" class="mt-3 text-sm text-gray-400 hover:text-gray-600 transition">
        ข้ามไปก่อน
      </button>
    </div>
  </div>

  <!-- ===== PAGE: Dashboard ===== -->
  <div id="dashboard" class="page active">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold mb-1 char-display">汉字轻松学</h1>
      <p class="text-gray-500 text-lg">เรียนภาษาจีนง่ายๆ ทีละตัว</p>
    </div>

    <!-- 总体进度 -->
    <div class="mb-8 max-w-md mx-auto">
      <div class="flex justify-between items-center mb-2">
        <span class="text-sm font-semibold text-gray-600">ความก้าวหน้าทั้งหมด</span>
        <span id="progress-text" class="text-sm font-bold text-blue-600">0%</span>
      </div>
      <div class="progress-bar-bg">
        <div id="overall-progress" class="progress-bar-fill" style="width: 0%"></div>
      </div>
    </div>

    <!-- Level 卡片网格 -->
    <div id="level-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <!-- 动态渲染 -->
    </div>

    <div class="text-center mt-8 text-sm text-gray-400">
      &#128218; คลิกที่การ์ดเพื่อเริ่มเรียน
    </div>
  </div>

  <!-- ===== PAGE: Review ===== -->
  <div id="review-page" class="page">
    <div class="mb-6">
      <button class="nav-btn nav-btn-back" onclick="showLearning()">
        &#8592; ข้ามการทบทวน
      </button>
    </div>
    <div class="text-center mb-6">
      <h2 class="text-2xl font-bold">&#128221; ทบทวนก่อนเรียน</h2>
      <p class="text-gray-500 mt-1">มาทบทวนตัวอักษรที่เรียนไปแล้วกันเถอะ!</p>
    </div>
    <div id="review-content" class="max-w-lg mx-auto">
      <!-- 动态渲染 -->
    </div>
  </div>

  <!-- ===== PAGE: Learning ===== -->
  <div id="learning-page" class="page">
    <!-- 顶部导航 -->
    <div class="flex items-center justify-between mb-4">
      <button class="nav-btn nav-btn-back" onclick="showDashboard()">
        &#8592; กลับ
      </button>
      <h2 id="learning-level-title" class="text-lg font-bold"></h2>
    </div>

    <!-- 汉字 Tab 切换 -->
    <div id="char-tabs" class="flex justify-center gap-3 mb-6">
      <!-- 动态渲染 -->
    </div>

    <!-- 基础信息区 -->
    <div class="bg-white rounded-xl shadow-sm p-6 mb-4 text-center">
      <div class="flex items-center justify-center gap-4 mb-3">
        <span id="char-display" class="char-main char-display"></span>
        <button class="audio-btn" onclick="playAudio()" title="ฟังเสียง">
          &#128264;
        </button>
      </div>
      <div id="char-pinyin" class="pinyin mb-1"></div>
      <div id="char-thai" class="thai-meaning"></div>
    </div>

    <!-- 字源演变区 -->
    <div class="mb-4">
      <h3 class="text-lg font-bold mb-2">&#128220; ที่มาของตัวอักษร</h3>
      <div id="etymology-section" class="etymology-section">
        <!-- 动态渲染 -->
      </div>
    </div>

    <!-- 笔顺动画 + 手写练习 并排 -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
      <!-- 笔顺动画区 -->
      <div class="bg-white rounded-xl shadow-sm p-4">
        <h3 class="text-lg font-bold mb-3 text-center">&#9999;&#65039; ลำดับขีด</h3>
        <div class="flex justify-center mb-3">
          <div class="grid-container" style="width:250px;height:250px;">
            <svg class="grid-lines" viewBox="0 0 250 250">
              <line x1="125" y1="0" x2="125" y2="250"/>
              <line x1="0" y1="125" x2="250" y2="125"/>
              <line x1="0" y1="0" x2="250" y2="250"/>
              <line x1="250" y1="0" x2="0" y2="250"/>
            </svg>
            <div id="animation-target"></div>
          </div>
        </div>
        <div class="text-center">
          <button class="quiz-btn quiz-btn-primary" onclick="playAnimation()">
            &#9654; เล่นอนิเมชัน
          </button>
        </div>
      </div>

      <!-- 手写练习区 -->
      <div class="bg-white rounded-xl shadow-sm p-4">
        <h3 class="text-lg font-bold mb-3 text-center">&#9997;&#65039; ฝึกเขียน</h3>
        <div class="flex justify-center mb-3">
          <div class="grid-container" style="width:250px;height:250px;">
            <svg class="grid-lines" viewBox="0 0 250 250">
              <line x1="125" y1="0" x2="125" y2="250"/>
              <line x1="0" y1="125" x2="250" y2="125"/>
              <line x1="0" y1="0" x2="250" y2="250"/>
              <line x1="250" y1="0" x2="0" y2="250"/>
            </svg>
            <div id="quiz-target"></div>
          </div>
        </div>
        <div class="text-center">
          <button class="quiz-btn quiz-btn-danger" onclick="clearQuiz()">
            &#128465; ล้างแล้วเขียนใหม่
          </button>
        </div>
        <div id="quiz-feedback" class="mt-3 text-center"></div>
      </div>
    </div>

    <!-- 底部导航 -->
    <div class="flex justify-between items-center">
      <button id="btn-prev-char" class="nav-btn nav-btn-back" onclick="prevChar()">
        &#8592; ก่อนหน้า
      </button>
      <button id="btn-next-char" class="nav-btn nav-btn-next" onclick="nextChar()">
        ถัดไป &#8594;
      </button>
      <button id="btn-finish-level" class="nav-btn quiz-btn-success" onclick="finishLevel()" style="display:none;">
        &#10003; เสร็จสิ้น
      </button>
    </div>
  </div>

  <!-- JS Modules -->
  <script src="js/firebase-config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/review.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
